openapi: 3.1.2
info:
  title: SDKWork App Store App API
  version: 1.0.0
  description: 'App/client contract for SDKWork App Store catalog, listings, publishers,
    releases, compliance, library, and wishlist capabilities.

    '
  x-sdkwork-owner: sdkwork-appstore
  x-sdkwork-api-authority: sdkwork-appstore-app-api
  x-sdkwork-sdk-family: sdkwork-appstore-app-sdk
  x-sdkwork-domain: appstore
  x-sdkwork-standard-profile: sdkwork-appstore-app-v3
  x-sdkwork-audience: Store clients, publisher console, mobile/H5/PC apps
servers:
- url: http://127.0.0.1:18090
  description: Local sdkwork-appstore runtime
tags:
- name: catalog
  description: Storefront discovery surfaces
- name: listings
  description: Store listing metadata and submissions
- name: publishers
  description: Developer/publisher accounts
- name: releases
  description: Version and artifact lifecycle
- name: compliance
  description: Privacy and content rating disclosures
- name: library
  description: Installed apps and updates
- name: wishlist
  description: Saved listings
- name: downloadGrants
  description: Controlled artifact download authorization
security:
- AuthToken: []
  AccessToken: []
paths:
  /app/v3/api/catalog/home:
    get:
      tags:
      - catalog
      summary: Retrieve storefront home feed
      operationId: appstore.catalog.home.retrieve
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
  /app/v3/api/catalog/categories:
    get:
      tags:
      - catalog
      summary: List store categories
      operationId: appstore.catalog.categories.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: locale
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
  /app/v3/api/catalog/categories/{categoryId}:
    get:
      tags:
      - catalog
      summary: Retrieve category detail
      operationId: appstore.catalog.categories.retrieve
      parameters:
      - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
  /app/v3/api/catalog/collections:
    get:
      tags:
      - catalog
      summary: List editorial collections
      operationId: appstore.catalog.collections.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionListResponse'
  /app/v3/api/catalog/collections/{collectionId}:
    get:
      tags:
      - catalog
      summary: Retrieve collection detail
      operationId: appstore.catalog.collections.retrieve
      parameters:
      - $ref: '#/components/parameters/CollectionId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
  /app/v3/api/catalog/featured:
    get:
      tags:
      - catalog
      summary: List featured placements
      operationId: appstore.catalog.featured.list
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturedListResponse'
  /app/v3/api/catalog/charts/{chartCode}:
    get:
      tags:
      - catalog
      summary: Retrieve chart rankings
      operationId: appstore.catalog.charts.retrieve
      parameters:
      - name: chartCode
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartResponse'
  /app/v3/api/catalog/listings/search:
    get:
      tags:
      - catalog
      summary: Search public listings
      operationId: appstore.catalog.listings.search
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: categoryId
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingSummaryListResponse'
  /app/v3/api/listings:
    post:
      tags:
      - listings
      summary: Create listing for PlusApp
      operationId: appstore.listings.create
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
  /app/v3/api/listings/{listingId}:
    get:
      tags:
      - listings
      summary: Retrieve listing detail
      operationId: appstore.listings.retrieve
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
    patch:
      tags:
      - listings
      summary: Update listing metadata
      operationId: appstore.listings.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
  /app/v3/api/listings/{listingId}/localizations/{locale}:
    put:
      tags:
      - listings
      summary: Upsert listing localization
      operationId: appstore.listings.localization.upsert
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingLocalizationUpsertRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingLocalizationResponse'
  /app/v3/api/listings/{listingId}/media:
    get:
      tags:
      - listings
      summary: List listing media
      operationId: appstore.listings.media.list
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingMediaListResponse'
    post:
      tags:
      - listings
      summary: Attach listing media
      operationId: appstore.listings.media.attach
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingMediaAttachRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingMediaResponse'
  /app/v3/api/listings/{listingId}/media/{mediaId}:
    delete:
      tags:
      - listings
      summary: Remove listing media
      operationId: appstore.listings.media.remove
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - name: mediaId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Removed
  /app/v3/api/listings/{listingId}/categories:
    put:
      tags:
      - listings
      summary: Bind listing categories
      operationId: appstore.listings.categories.bind
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCategoryBindRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
  /app/v3/api/listings/{listingId}/regions:
    put:
      tags:
      - listings
      summary: Update regional availability
      operationId: appstore.listings.regions.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegionalAvailabilityUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionalAvailabilityListResponse'
  /app/v3/api/listings/{listingId}/releases:
    post:
      tags:
      - releases
      summary: Create release for listing
      operationId: appstore.releases.create
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
  /app/v3/api/listings/{listingId}/submissions:
    post:
      tags:
      - listings
      summary: Submit listing for review
      operationId: appstore.listings.submissions.create
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingSubmissionCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingSubmissionResponse'
  /app/v3/api/publishers/me:
    get:
      tags:
      - publishers
      summary: Retrieve current publisher profile
      operationId: appstore.publishers.me.retrieve
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherResponse'
  /app/v3/api/publishers:
    post:
      tags:
      - publishers
      summary: Create publisher profile
      operationId: appstore.publishers.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherResponse'
  /app/v3/api/publishers/{publisherId}:
    patch:
      tags:
      - publishers
      summary: Update publisher profile
      operationId: appstore.publishers.update
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherResponse'
  /app/v3/api/publishers/{publisherId}/members:
    get:
      tags:
      - publishers
      summary: List publisher members
      operationId: appstore.publishers.members.list
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherMemberListResponse'
    post:
      tags:
      - publishers
      summary: Invite publisher member
      operationId: appstore.publishers.members.invite
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherMemberInviteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherMemberResponse'
  /app/v3/api/publishers/{publisherId}/verifications:
    post:
      tags:
      - publishers
      summary: Submit publisher verification
      operationId: appstore.publishers.verifications.submit
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherVerificationSubmitRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherVerificationResponse'
  /app/v3/api/releases/{releaseId}:
    get:
      tags:
      - releases
      summary: Retrieve release detail
      operationId: appstore.releases.retrieve
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
    patch:
      tags:
      - releases
      summary: Update release metadata
      operationId: appstore.releases.update
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
  /app/v3/api/releases/{releaseId}/notes/{locale}:
    put:
      tags:
      - releases
      summary: Upsert localized release notes
      operationId: appstore.releases.notes.upsert
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseNotesUpsertRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseNotesResponse'
  /app/v3/api/releases/{releaseId}/artifacts:
    post:
      tags:
      - releases
      summary: Attach release artifact
      operationId: appstore.releases.artifacts.attach
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseArtifactAttachRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseArtifactResponse'
  /app/v3/api/releases/{releaseId}/rollout:
    put:
      tags:
      - releases
      summary: Update staged rollout
      operationId: appstore.releases.rollout.update
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseRolloutUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseRolloutResponse'
  /app/v3/api/releases/{releaseId}/retire:
    post:
      tags:
      - releases
      summary: Retire release
      operationId: appstore.releases.retire
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
  /app/v3/api/listings/{listingId}/compliance:
    get:
      tags:
      - compliance
      summary: Retrieve compliance profile
      operationId: appstore.compliance.profile.retrieve
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceProfileResponse'
    put:
      tags:
      - compliance
      summary: Update compliance profile
      operationId: appstore.compliance.profile.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceProfileUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceProfileResponse'
  /app/v3/api/listings/{listingId}/compliance/permissions:
    put:
      tags:
      - compliance
      summary: Update permission disclosures
      operationId: appstore.compliance.permissions.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompliancePermissionUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompliancePermissionListResponse'
  /app/v3/api/library/items:
    get:
      tags:
      - library
      summary: List library items
      operationId: appstore.library.items.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryItemListResponse'
  /app/v3/api/library/items/{libraryItemId}:
    get:
      tags:
      - library
      summary: Retrieve library item
      operationId: appstore.library.items.retrieve
      parameters:
      - name: libraryItemId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryItemResponse'
  /app/v3/api/library/install:
    post:
      tags:
      - library
      summary: Record install and prepare download
      operationId: appstore.library.install
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryInstallRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryInstallResponse'
  /app/v3/api/library/uninstall:
    post:
      tags:
      - library
      summary: Record uninstall
      operationId: appstore.library.uninstall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryUninstallRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
  /app/v3/api/library/updates/check:
    post:
      tags:
      - library
      summary: Check library updates
      operationId: appstore.library.updates.check
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryUpdatesCheckRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryUpdatesCheckResponse'
  /app/v3/api/wishlist/items:
    get:
      tags:
      - wishlist
      summary: List wishlist items
      operationId: appstore.wishlist.items.list
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItemListResponse'
    post:
      tags:
      - wishlist
      summary: Add wishlist item
      operationId: appstore.wishlist.items.add
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WishlistItemAddRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItemResponse'
  /app/v3/api/wishlist/items/{listingId}:
    delete:
      tags:
      - wishlist
      summary: Remove wishlist item
      operationId: appstore.wishlist.items.remove
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '204':
          description: Removed
  /app/v3/api/download_grants:
    post:
      tags:
      - downloadGrants
      summary: Create download grant
      operationId: appstore.downloadGrants.create
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadGrantCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadGrantResponse'
  /app/v3/api/download_grants/{grantId}/consume:
    post:
      tags:
      - downloadGrants
      summary: Consume download grant
      operationId: appstore.downloadGrants.consume
      parameters:
      - name: grantId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadGrantConsumeResponse'
components:
  securitySchemes:
    AuthToken:
      type: apiKey
      in: header
      name: Auth-Token
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    ListingId:
      name: listingId
      in: path
      required: true
      schema:
        type: string
    PublisherId:
      name: publisherId
      in: path
      required: true
      schema:
        type: string
    ReleaseId:
      name: releaseId
      in: path
      required: true
      schema:
        type: string
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
    CollectionId:
      name: collectionId
      in: path
      required: true
      schema:
        type: string
    Locale:
      name: locale
      in: path
      required: true
      schema:
        type: string
  schemas:
    ProblemDetail:
      type: object
      additionalProperties: true
      required:
      - type
      - title
      - status
      - code
      - traceId
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          $ref: '#/components/schemas/SdkWorkPlatformErrorCode'
        traceId:
          type: string
          format: uuid
          description: Server-owned request correlation id.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    MediaResource:
      type: object
      required:
      - id
      - kind
      properties:
        id:
          type: string
        kind:
          type: string
        url:
          type: string
        driveNodeId:
          type: string
    ListingSummary:
      type: object
      required:
      - id
      - plusAppKey
      - displayName
      - listingSlug
      - pricingModel
      properties:
        id:
          type: string
        plusAppId:
          type: string
        plusAppKey:
          type: string
        displayName:
          type: string
        subtitle:
          type: string
        listingSlug:
          type: string
        pricingModel:
          type: string
          enum:
          - FREE
          - PAID
          - FREEMIUM
          - SUBSCRIPTION
        icon:
          $ref: '#/components/schemas/MediaResource'
        averageRating:
          type: string
        ratingCount:
          type: integer
    ListingResponse:
      allOf:
      - $ref: '#/components/schemas/SdkWorkApiResponse'
      - type: object
        required:
        - data
        properties:
          data:
            type: object
            required:
            - item
            properties:
              item:
                $ref: '#/components/schemas/ListingDetail'
    ListingDetail:
      allOf:
      - $ref: '#/components/schemas/ListingSummary'
      - type: object
        properties:
          listingStatus:
            type: string
          reviewStatus:
            type: string
