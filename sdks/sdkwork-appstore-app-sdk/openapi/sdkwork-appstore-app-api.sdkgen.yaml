components:
  securitySchemes:
    AuthToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessToken:
      type: apiKey
      in: header
      name: Access-Token
  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    ListingId:
      name: listingId
      in: path
      required: true
      schema:
        type: string
    PublisherId:
      name: publisherId
      in: path
      required: true
      schema:
        type: string
    ReleaseId:
      name: releaseId
      in: path
      required: true
      schema:
        type: string
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
    CollectionId:
      name: collectionId
      in: path
      required: true
      schema:
        type: string
    Locale:
      name: locale
      in: path
      required: true
      schema:
        type: string
  schemas:
    ProblemDetail:
      type: object
      additionalProperties: true
      required:
      - type
      - title
      - status
      - code
      - traceId
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          $ref: '#/components/schemas/SdkWorkPlatformErrorCode'
        traceId:
          type: string
          format: uuid
          description: Server-owned request correlation id.
        i18nKey:
          type: string
          description: Optional stable localization key such as errors.result.40001.
        locale:
          type: string
          description: Optional effective BCP 47 locale used by framework message
            mapping.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    MediaResource:
      type: object
      required:
      - id
      - kind
      properties:
        id:
          type: string
        kind:
          type: string
        url:
          type: string
        driveNodeId:
          type: string
    ListingSummary:
      type: object
      required:
      - id
      - appKey
      - displayName
      - listingSlug
      - pricingModel
      properties:
        id:
          type: string
        appId:
          type: string
        appKey:
          type: string
        displayName:
          type: string
        subtitle:
          type: string
        listingSlug:
          type: string
        pricingModel:
          type: string
          enum:
          - FREE
          - PAID
          - FREEMIUM
          - SUBSCRIPTION
        icon:
          $ref: '#/components/schemas/MediaResource'
        averageRating:
          type: string
        ratingCount:
          type: integer
    ListingResponse:
      allOf:
      - $ref: '#/components/schemas/SdkWorkApiResponse'
      - type: object
        required:
        - data
        properties:
          data:
            type: object
            required:
            - item
            properties:
              item:
                $ref: '#/components/schemas/ListingDetail'
    ListingDetail:
      allOf:
      - $ref: '#/components/schemas/ListingSummary'
      - type: object
        properties:
          listingStatus:
            type: string
          reviewStatus:
            type: string
          commentsThreadId:
            type: string
          commerceProductId:
            type: string
            description: Commerce catalog product id for paid checkout (clawrouter/commerce
              domain).
          currentReleaseId:
            type: string
          categories:
            type: array
            items:
              type: string
    ListingCreateRequest:
      type: object
      required:
      - appId
      - appKey
      - publisherId
      - defaultLocale
      properties:
        appId:
          type: string
        appKey:
          type: string
        publisherId:
          type: string
        listingSlug:
          type: string
        pricingModel:
          type: string
        defaultLocale:
          type: string
    PublisherAppBootstrapRequest:
      type: object
      required:
      - appKey
      - displayName
      - defaultLocale
      properties:
        appKey:
          type: string
        displayName:
          type: string
        defaultLocale:
          type: string
        appType:
          type: string
        listingSlug:
          type: string
        pricingModel:
          type: string
    PublisherAppBootstrapResponse:
