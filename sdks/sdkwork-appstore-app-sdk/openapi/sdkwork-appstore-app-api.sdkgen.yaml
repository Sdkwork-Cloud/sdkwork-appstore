openapi: 3.1.2
info:
  title: SDKWork App Store App API
  version: 1.0.0
  description: 'App/client contract for SDKWork App Store catalog, listings, publishers,
    releases, compliance, library, and wishlist capabilities.

    '
  x-sdkwork-owner: sdkwork-appstore
  x-sdkwork-api-authority: sdkwork-appstore-app-api
  x-sdkwork-sdk-family: sdkwork-appstore-app-sdk
  x-sdkwork-domain: appstore
  x-sdkwork-standard-profile: sdkwork-v3
  x-sdkwork-audience: Store clients, publisher console, mobile/H5/PC apps
servers:
- url: http://127.0.0.1:18090
  description: Local sdkwork-appstore runtime
tags:
- name: catalog
  description: Storefront discovery surfaces
- name: listings
  description: Store listing metadata and submissions
- name: publishers
  description: Developer/publisher accounts
- name: releases
  description: Version and artifact lifecycle
- name: compliance
  description: Privacy and content rating disclosures
- name: library
  description: Installed apps and updates
- name: wishlist
  description: Saved listings
- name: downloadGrants
  description: Controlled artifact download authorization
security:
- AuthToken: []
  AccessToken: []
paths:
  /app/v3/api/appstore/catalog/home:
    get:
      tags:
      - catalog
      summary: Retrieve storefront home feed
      operationId: appstore.catalog.home.retrieve
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeFeedResponse'
  /app/v3/api/appstore/catalog/categories:
    get:
      tags:
      - catalog
      summary: List store categories
      operationId: appstore.catalog.categories.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      - name: locale
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
  /app/v3/api/appstore/catalog/categories/{categoryId}:
    get:
      tags:
      - catalog
      summary: Retrieve category detail
      operationId: appstore.catalog.categories.retrieve
      parameters:
      - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/Category'
  /app/v3/api/appstore/catalog/collections:
    get:
      tags:
      - catalog
      summary: List editorial collections
      operationId: appstore.catalog.collections.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionListResponse'
  /app/v3/api/appstore/catalog/collections/{collectionId}:
    get:
      tags:
      - catalog
      summary: Retrieve collection detail
      operationId: appstore.catalog.collections.retrieve
      parameters:
      - $ref: '#/components/parameters/CollectionId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/CatalogCollection'
  /app/v3/api/appstore/catalog/featured:
    get:
      tags:
      - catalog
      summary: List featured placements
      operationId: appstore.catalog.featured.list
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturedListResponse'
  /app/v3/api/appstore/catalog/charts/{chartCode}:
    get:
      tags:
      - catalog
      summary: Retrieve chart rankings
      operationId: appstore.catalog.charts.retrieve
      parameters:
      - name: chartCode
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/CatalogChartSnapshot'
  /app/v3/api/appstore/catalog/listings/search:
    get:
      tags:
      - catalog
      summary: Search public listings
      operationId: appstore.catalog.listings.list
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: categoryId
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingSummaryListResponse'
  /app/v3/api/appstore/catalog/recommendations:
    get:
      tags:
      - catalog
      summary: List recommended listings
      operationId: appstore.catalog.recommendations.list
      parameters:
      - name: locale
        in: query
        schema:
          type: string
      - name: platform
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/appstore/catalog/recently_updated:
    get:
      tags:
      - catalog
      summary: List recently updated listings
      operationId: appstore.catalog.recentlyUpdated.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      - name: locale
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/appstore/catalog/events:
    get:
      tags:
      - catalog
      summary: List catalog events
      operationId: appstore.catalog.events.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      - name: status
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/appstore/catalog/events/{eventId}:
    get:
      tags:
      - catalog
      summary: Retrieve catalog event detail
      operationId: appstore.catalog.events.retrieve
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
  /app/v3/api/appstore/catalog/search/suggestions:
    get:
      tags:
      - catalog
      summary: List search suggestions
      operationId: appstore.catalog.search.suggestions.list
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
      - name: locale
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/appstore/catalog/search/trending:
    get:
      tags:
      - catalog
      summary: List trending search terms
      operationId: appstore.catalog.search.trending.list
      parameters:
      - name: locale
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/appstore/catalog/search/history:
    get:
      tags:
      - catalog
      summary: List search history
      operationId: appstore.catalog.search.history.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
    put:
      tags:
      - catalog
      summary: Upsert search history entry
      operationId: appstore.catalog.search.history.update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchHistoryUpsertRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkApiResponse'
    delete:
      tags:
      - catalog
      summary: Clear search history
      operationId: appstore.catalog.search.history.delete
      responses:
        '204':
          description: Removed
  /app/v3/api/listings:
    post:
      tags:
      - listings
      summary: Create listing for registered app
      operationId: appstore.listings.create
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
  /app/v3/api/listings/{listingId}:
    get:
      tags:
      - listings
      summary: Retrieve listing detail
      operationId: appstore.listings.retrieve
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
    patch:
      tags:
      - listings
      summary: Update listing metadata
      operationId: appstore.listings.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
  /app/v3/api/listings/{listingId}/localizations/{locale}:
    put:
      tags:
      - listings
      summary: Upsert listing localization
      operationId: appstore.listings.localization.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingLocalizationUpsertRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingLocalizationResponse'
  /app/v3/api/listings/{listingId}/media:
    get:
      tags:
      - listings
      summary: List listing media
      operationId: appstore.listings.media.list
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingMediaListResponse'
    post:
      tags:
      - listings
      summary: Attach listing media
      operationId: appstore.listings.media.create
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingMediaAttachRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingMediaResponse'
  /app/v3/api/listings/{listingId}/media/{mediaId}:
    delete:
      tags:
      - listings
      summary: Remove listing media
      operationId: appstore.listings.media.delete
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - name: mediaId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Removed
  /app/v3/api/listings/{listingId}/categories:
    put:
      tags:
      - listings
      summary: Bind listing categories
      operationId: appstore.listings.categories.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCategoryBindRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/listings/{listingId}/regions:
    put:
      tags:
      - listings
      summary: Update regional availability
      operationId: appstore.listings.regions.update
      parameters:
      - $ref: '#/components/parameters/ListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegionalAvailabilityUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/listings/{listingId}/releases:
    get:
      tags:
      - listings
      summary: List releases for listing
      operationId: appstore.listings.releases.list
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingReleaseListResponse'
    post:
      tags:
      - releases
      summary: Create release for listing
      operationId: appstore.releases.create
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
  /app/v3/api/listings/{listingId}/releases/history:
    get:
      tags:
      - listings
      summary: List release history for listing
      operationId: appstore.listings.releases.history.list
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingReleaseListResponse'
  /app/v3/api/listings/{listingId}/similar:
    get:
      tags:
      - listings
      summary: List similar listings
      operationId: appstore.listings.similar.list
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/listings/{listingId}/developer_other:
    get:
      tags:
      - listings
      summary: List other listings from the same developer
      operationId: appstore.listings.developerOther.list
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/listings/{listingId}/editorial:
    get:
      tags:
      - listings
      summary: Retrieve listing editorial content
      operationId: appstore.listings.editorial.retrieve
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkResourceResponse'
  /app/v3/api/listings/{listingId}/submissions:
    post:
      tags:
      - listings
      summary: Submit listing for review
      operationId: appstore.listings.submissions.create
      parameters:
      - $ref: '#/components/parameters/ListingId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingSubmissionCreateRequest'
      responses:
        '201':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingSubmissionResponse'
  /app/v3/api/publishers/me:
    get:
      tags:
      - publishers
      summary: Retrieve current publisher profile
      operationId: appstore.publishers.me.retrieve
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherResponse'
  /app/v3/api/publishers/me/listings:
    get:
      tags:
      - publishers
      summary: List listings owned by the current publisher
      operationId: appstore.publishers.me.listings.list
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SdkWorkListResponse'
  /app/v3/api/publishers/me/apps:
    post:
      tags:
      - publishers
      summary: Bootstrap appstore_app and draft listing for the current publisher
      operationId: appstore.publishers.me.apps.create
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherAppBootstrapRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SdkWorkApiResponse'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      type: object
                      required:
                      - item
                      properties:
                        item:
                          $ref: '#/components/schemas/PublisherAppBootstrapResponse'
  /app/v3/api/publishers:
    post:
      tags:
      - publishers
      summary: Create publisher profile
      operationId: appstore.publishers.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherResponse'
  /app/v3/api/publishers/{publisherId}:
    patch:
      tags:
      - publishers
      summary: Update publisher profile
      operationId: appstore.publishers.update
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherResponse'
  /app/v3/api/publishers/{publisherId}/members:
    get:
      tags:
      - publishers
      summary: List publisher members
      operationId: appstore.publishers.members.list
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherMemberListResponse'
    post:
      tags:
      - publishers
      summary: Invite publisher member
      operationId: appstore.publishers.members.create
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherMemberInviteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherMemberResponse'
  /app/v3/api/publishers/{publisherId}/verifications:
    post:
      tags:
      - publishers
      summary: Submit publisher verification
      operationId: appstore.publishers.verifications.create
      parameters:
      - $ref: '#/components/parameters/PublisherId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublisherVerificationSubmitRequest'
      responses:
        '201':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherVerificationResponse'
  /app/v3/api/releases/{releaseId}:
    get:
      tags:
      - releases
      summary: Retrieve release detail
      operationId: appstore.releases.retrieve
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
    patch:
      tags:
      - releases
      summary: Update release metadata
      operationId: appstore.releases.update
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
  /app/v3/api/releases/{releaseId}/notes/{locale}:
    put:
      tags:
      - releases
      summary: Upsert localized release notes
      operationId: appstore.releases.notes.update
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseNotesUpsertRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseNotesResponse'
  /app/v3/api/releases/{releaseId}/artifacts:
    post:
      tags:
      - releases
      summary: Attach release artifact
      operationId: appstore.releases.artifacts.create
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseArtifactAttachRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseArtifactResponse'
  /app/v3/api/releases/{releaseId}/rollout:
    put:
      tags:
      - releases
      summary: Update staged rollout
      operationId: appstore.releases.rollout.update
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseRolloutUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseRolloutResponse'
  /app/v3/api/releases/{releaseId}/retire:
    post:
      tags:
      - releases
      summary: Retire release
      operationId: appstore.releases.retire
      parameters:
      - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
  /app/v3/api/listings/{listingId}/compliance:
    get:
      tags:
      - compliance
      summary: Retrieve compliance profile
      operationId: appstore.compliance.profile.retrieve
      parameters:
      - $ref: '#/components/parameters/ListingId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceProfileResponse'
    put:
      tags:
      - compliance
      summary: Update compliance profile
      operationId: appstore.compliance.profile.update
