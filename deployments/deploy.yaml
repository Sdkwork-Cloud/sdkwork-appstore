schemaVersion: 1
kind: sdkwork.deploy
application: sdkwork-appstore
deploymentProfiles:
  - id: standalone
    runtimeTarget: server
    serviceLayout: unified-process
    processes:
      - id: application.public-ingress
        crate: sdkwork-api-appstore-standalone-gateway
        binary: sdkwork-api-appstore-standalone-gateway
    clientSurfaces:
      - id: sdkwork-appstore-pc
        package: apps/sdkwork-appstore-pc
        artifact: dist
      - id: sdkwork-appstore-h5
        package: apps/sdkwork-appstore-h5
        artifact: dist
  - id: cloud
    runtimeTarget: container
    serviceLayout: split-services
    processes:
      - id: application.public-ingress
        crate: sdkwork-api-appstore-standalone-gateway
        binary: sdkwork-api-appstore-standalone-gateway
topologySpec: specs/topology.spec.json
